<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>JARVIS</h1>
                <p>Your Personal AI Assistant</p>
            </div>
            
            <div class="form-container">
                <h2>Login to Your Account</h2>
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                
                <div id="errorMsg" class="error-msg hidden"></div>
                
                <button id="loginBtn" class="btn-primary">Login</button>
                
                <p class="footer-text">
                    Don't have an account? 
                    <a href="signup.html">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Login page specific script
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorMsg.textContent = 'Please enter username and password';
                errorMsg.classList.remove('hidden');
                return;
            }
            
            errorMsg.classList.add('hidden');
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save token and user info
                    localStorage.setItem('jarvis_token', data.token);
                    localStorage.setItem('jarvis_user', data.user.username);
                    // Redirect to chat
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Is server running?';
                errorMsg.classList.remove('hidden');
            }
        });
        
        // Enter key press
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
